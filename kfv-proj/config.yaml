sport: nfl                 # nfl or nba
game_length_minutes: 60     # 60 for NFL, 48 for NBA

elo:
  k_factor: 20              # how fast ratings update after each game
  home_field_advantage: 65  # elo points added to home team
  initial_rating: 1500

sigma:                      # rough starting values in points; REFIT per sport on real data
  default_nfl: 13.5         # overwritten by fit_sigma.py when you pass --sigma
  default_nba: 11.0
  default_wnba: 10.5        # 40-min game, slightly lower scoring than NBA
  default_ncaamb: 11.5      # 40-min college men's game
  default_ncaaf: 16.0       # college football swings more than NFL (bigger blowouts)

kelly:
  fraction: 0.25            # fractional Kelly (quarter-Kelly), safer than full Kelly
  min_edge_to_trade: 0.03   # ignore edges smaller than 3 percentage points
  slippage_haircut: 0.01    # assume 1c worse fill than quoted price

live_monitor:
  poll_interval_seconds: 15
  edge_alert_threshold: 0.05
